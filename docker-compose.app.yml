version: '3.8'

services:
  app:
    image: jenkins-cicd-app:latest
    container_name: flask-app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=mysql-app
      - DB_USER=appuser
      - DB_PASSWORD=apppass
      - DB_NAME=appdb
    restart: unless-stopped

  mysql-app:
    image: mysql:8.0
    container_name: mysql-app
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - mysql_app_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_app_data:
